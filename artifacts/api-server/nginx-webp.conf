# Nginx WebP auto-serve for /uploads/ images
# Add this inside your server {} block or as an include.
#
# When a browser requests /uploads/image.jpg and the Accept header
# contains "image/webp", Nginx will try to serve /uploads/image.webp instead.
# If the .webp version doesn't exist, the original file is served.

location /uploads/ {
    alias /var/www/pickme-store/uploads/;

    # Try .webp variant first for browsers that support it
    location ~* ^/uploads/(.+)\.(jpe?g|png)$ {
        set $webp "";
        if ($http_accept ~* "image/webp") {
            set $webp ".webp";
        }

        # Try: webp version → original → 404
        alias /var/www/pickme-store/uploads/;
        try_files $1$webp $1.$2 =404;

        # Cache images aggressively
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept";
    }

    # WebP files served directly
    location ~* \.webp$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
